name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      # macOS: download portable Node.js for bundling
      - name: Download Node.js binary (macOS)
        if: runner.os == 'macOS'
        run: bash scripts/download-node.sh

      # Windows: download portable Node.js for bundling
      - name: Download Node.js binary (Windows)
        if: runner.os == 'Windows'
        run: powershell -ExecutionPolicy Bypass -File scripts/download-node.ps1

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: "Chatterbox v__VERSION__"
          releaseBody: |
            Download the desktop app for your platform:

            **macOS**
            - Apple Silicon (M1/M2/M3): `Chatterbox_aarch64.dmg`
            - Intel: `Chatterbox_x64.dmg`

            **Windows**
            - Installer: `Chatterbox_x64-setup.exe`
            - MSI: `Chatterbox_x64_en-US.msi`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
