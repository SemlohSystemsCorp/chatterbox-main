name: Release Desktop App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Download Node.js binary
        run: powershell -ExecutionPolicy Bypass -File scripts/download-node.ps1

      - name: Create .env file
        shell: pwsh
        run: |
          "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" | Out-File -FilePath .env -Encoding utf8
          "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" | Out-File -FilePath .env -Append -Encoding utf8

      - name: Verify .env exists
        shell: pwsh
        run: |
          if (!(Test-Path .env)) { Write-Error ".env file not created"; exit 1 }
          Write-Host ".env file created with $(Get-Content .env | Measure-Object -Line | Select-Object -ExpandProperty Lines) lines"

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: "https://chatterbox-devs.vercel.app"
        with:
          tagName: latest
          releaseName: "Chatterbox Desktop"
          releaseBody: |
            Download the Chatterbox desktop app.

            **Windows**
            - Installer: `Chatterbox_x64-setup.exe`
            - MSI: `Chatterbox_x64_en-US.msi`

            **macOS**
            - Build locally with `npm run tauri:build`
          releaseDraft: false
          prerelease: false
          updatedReleaseBody: true
